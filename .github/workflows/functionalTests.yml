name: WDIO CI

on:
  push:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run E2E Tests
        run: npx wdio run ./wdio.conf.ts --shard=${{ matrix.shard }}/4

      # Gera o relatório HTML do Allure
      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report

      # Faz upload dos resultados brutos (importante pra histórico)
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results

      # Upload do report HTML
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.shard }}
          path: allure-report